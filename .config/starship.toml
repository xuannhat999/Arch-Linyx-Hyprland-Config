"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
[ ůį£á ](bold bg:#a3aed2 fg:#090c0c)\
$username\
[Óāī](bg:#769ff0 fg:#a3aed2)\
