[username]
style_user = " bold fg:#090c0c bg:#a3aed2"
style_root = " bold fg:#760303 bg:#a3aed2"
show_always = true
format = "[ $user ]($style)"
disabled = false

[directory]
style = " bold fg:#090c0c bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô"
"Downloads" = "ÔÄô"
"Music" = "ÔÄĀ"
"Pictures" = "ÔÄĺ"
"Videos" = "ÔÄĹ"
"~" = "ůįčú"

[git_branch]
symbol = "Ôźė"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#7ba2f0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#7ba2f0 bg:#394260)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#272e3f"
format = '[[ $symbol ](fg:#769ff0 bg:#272e3f)]($style)'

[python]
symbol = "ůįĆ†"
style = "bg:#272e3f"
